name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required so the job can create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install build deps
        run: python -m pip install -q pyinstaller pytest

      - name: Run tests (sanity before release)
        run: python -m pytest tests/

      - name: Build single-file exe
        run: >-
          python -m PyInstaller --onefile --windowed
          --name KeeneticFqdnManager
          --add-data "data;data"
          --clean main.py

      - name: Upload exe as artifact (for debugging failed runs)
        uses: actions/upload-artifact@v4
        with:
          name: KeeneticFqdnManager-${{ github.ref_name }}
          path: dist/KeeneticFqdnManager.exe

      - name: Extract tag annotation as release body
        id: tag_body
        shell: bash
        run: |
          # Annotated tags have a message body; use it as release notes.
          # Falls back to auto-generated changelog if the tag has no body.
          BODY=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}" | head -200)
          if [ -z "$BODY" ]; then
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          else
            # Write multi-line body to a file for the next step.
            echo "$BODY" > release_body.md
            echo "has_body=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach exe to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KeeneticFqdnManager.exe
          body_path: ${{ steps.tag_body.outputs.has_body == 'true' && 'release_body.md' || '' }}
          generate_release_notes: ${{ steps.tag_body.outputs.has_body != 'true' }}
          fail_on_unmatched_files: true
